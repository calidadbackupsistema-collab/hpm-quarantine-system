<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro de Cuarentena Planta 1</title>
    <style>
      :root {
        --navy: #071525;
        --panel: #0e2238;
        --blue: #2188ff;
        --cyan: #5bc0ff;
        --text: #eef7ff;
        --muted: #9fb4c9;
        --line: #27435f;
        --ok: #32d583;
        --warn: #fdb022;
        --bad: #f97066;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at 90% 0, #11385a 0, transparent 28%),
          var(--navy);
        color: var(--text);
        font:
          16px system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }
      .top {
        padding: 20px clamp(16px, 4vw, 48px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
        background: #071525e8;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .brand {
        display: flex;
        gap: 13px;
        align-items: center;
      }
      .mark {
        width: 43px;
        height: 43px;
        border-radius: 13px;
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 21px;
      }
      .brand h1 {
        font-size: clamp(18px, 3vw, 25px);
        margin: 0;
      }
      .brand p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 12px;
      }
      .wrap {
        max-width: 1280px;
        margin: auto;
        padding: 24px clamp(14px, 4vw, 42px) 60px;
      }
      .card {
        background: #0e2238ee;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: clamp(18px, 3vw, 30px);
        box-shadow: 0 18px 50px #0004;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }
      .full {
        grid-column: 1/-1;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 750;
        color: #cce3f8;
        margin-bottom: 7px;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #365979;
        background: #07192b;
        color: var(--text);
        border-radius: 12px;
        padding: 14px;
        font: inherit;
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px #2188ff33;
      }
      textarea {
        min-height: 105px;
        resize: vertical;
      }
      .primary,
      .ghost,
      .danger {
        border: 0;
        border-radius: 13px;
        padding: 14px 18px;
        font-weight: 800;
        cursor: pointer;
      }
      .primary {
        background: linear-gradient(135deg, var(--blue), #36a7ff);
        color: white;
      }
      .ghost {
        background: #16334f;
        color: #e8f5ff;
        border: 1px solid var(--line);
      }
      .danger {
        background: #542528;
        color: #ffd8d5;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 22px;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 7px;
        align-items: center;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 99px;
        background: var(--warn);
      }
      .dot.on {
        background: var(--ok);
      }
      .notice {
        padding: 13px 16px;
        border-radius: 12px;
        background: #0b3651;
        border: 1px solid #1c6a95;
        color: #d8f2ff;
        margin-bottom: 18px;
      }
      .hidden {
        display: none !important;
      }
      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }
      .tab {
        padding: 16px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #102a43;
        color: #bcd2e6;
        font-weight: 850;
        cursor: pointer;
      }
      .tab.active {
        background: linear-gradient(135deg, var(--blue), #36a7ff);
        color: white;
        border-color: transparent;
      }
      .summary {
        padding: 14px 16px;
        border: 1px solid #2d587b;
        background: #0a1d30;
        border-radius: 14px;
        margin-top: 12px;
      }
      .summary b {
        display: block;
        margin-bottom: 4px;
      }
      .kpis {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 18px;
      }
      .kpi {
        padding: 18px;
        border-radius: 18px;
        background: var(--panel);
        border: 1px solid var(--line);
      }
      .kpi b {
        font-size: 30px;
        display: block;
      }
      .kpi span {
        font-size: 12px;
        color: var(--muted);
      }
      .filters {
        display: grid;
        grid-template-columns: 2fr repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      .tablewrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1050px;
        background: #0b1c2e;
      }
      th,
      td {
        padding: 13px 12px;
        text-align: left;
        border-bottom: 1px solid #203a53;
        font-size: 13px;
      }
      th {
        color: #9fc9eb;
        background: #102a43;
        position: sticky;
        top: 0;
      }
      td strong {
        display: block;
      }
      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 11px;
        font-weight: 800;
        background: #493a16;
        color: #ffd98c;
      }
      .pill.LIBERADO {
        background: #12472f;
        color: #83efb9;
      }
      .pill.LIBERADO.PARCIAL {
        background: #1d446b;
        color: #a8d7ff;
      }
      .pill.RECHAZADO {
        background: #512525;
        color: #ffaaa5;
      }
      .pill.RETRABAJO {
        background: #233e62;
        color: #9dd1ff;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: #000b;
        display: grid;
        place-items: center;
        padding: 18px;
        z-index: 10;
      }
      .modal .card {
        width: min(560px, 100%);
      }
      .muted {
        color: var(--muted);
        font-size: 13px;
      }
      .empty {
        text-align: center;
        padding: 40px;
        color: var(--muted);
      }
      .brand h1,
      .tab,
      label,
      button {
        line-height: 1.35;
      }
      .tab {
        min-height: 58px;
      }
      @media (max-width: 760px) {
        .grid,
        .filters {
          grid-template-columns: 1fr;
        }
        .kpis {
          grid-template-columns: repeat(2, 1fr);
        }
        .top {
          position: static;
        }
        .actions {
          flex-direction: column;
        }
        .actions button {
          width: 100%;
        }
      }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  
<style id="trilingual-styles">
  .header-right{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:14px;
    flex-wrap:wrap;
  }
  .lang-switch{
    display:flex;
    gap:6px;
    padding:5px;
    border:1px solid var(--line);
    border-radius:12px;
    background:#091b2d;
    box-shadow:0 8px 24px #0003;
  }
  .lang-btn{
    border:1px solid transparent;
    border-radius:8px;
    padding:8px 10px;
    background:transparent;
    color:var(--muted);
    font-size:12px;
    font-weight:850;
    cursor:pointer;
    white-space:nowrap;
  }
  .lang-btn:hover{color:var(--text);background:#16334f}
  .lang-btn.active{
    color:#fff;
    background:linear-gradient(135deg,var(--blue),#36a7ff);
    box-shadow:0 4px 12px #2188ff40;
  }
  @media(max-width:760px){
    .top{align-items:flex-start;gap:14px;flex-wrap:wrap}
    .header-right{width:100%;justify-content:space-between}
    .lang-switch{order:2}
    .status{order:1}
  }
</style>


<style id="hpm-header-redesign">
  :root{
    --hpm-navy:#0b2d50;
    --hpm-navy2:#123e69;
    --hpm-red:#d7263d;
  }
  .top{
    position:sticky;
    top:0;
    z-index:50;
    padding:0;
    color:#fff;
    background:linear-gradient(120deg,rgba(9,37,66,.96),rgba(13,62,109,.92));
    border-bottom:1px solid rgba(255,255,255,.18);
    box-shadow:0 12px 35px rgba(4,22,39,.30);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
  }
  .top-inner{
    max-width:1580px;
    margin:0 auto;
    padding:12px clamp(16px,2.2vw,32px) 13px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }
  .logo-box{
    width:188px;
    height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.96);
    border:1px solid rgba(255,255,255,.78);
    border-radius:10px;
    box-shadow:0 10px 26px rgba(0,0,0,.20);
    flex:0 0 auto;
    overflow:hidden;
  }
  .logo-box img{
    max-width:174px;
    max-height:52px;
    display:block;
  }
  .title-wrap{min-width:0}
  .top .brand h1{
    margin:0;
    color:#fff;
    font-size:clamp(18px,2vw,24px);
    line-height:1.25;
    font-weight:900;
    letter-spacing:.1px;
  }
  .top .brand p{
    margin:5px 0 0;
    color:#eef6ff;
    opacity:.94;
    font-size:14px;
  }
  .hpm-chip{
    display:inline-flex;
    align-items:center;
    background:var(--hpm-red);
    color:#fff;
    font-size:11px;
    font-weight:950;
    letter-spacing:.7px;
    padding:4px 9px;
    border-radius:5px;
    margin-right:9px;
    vertical-align:middle;
  }
  .header-right{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:14px;
    flex:0 0 auto;
  }
  .lang-switch{
    display:flex;
    gap:5px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.16);
    padding:5px;
    border-radius:11px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
  }
  .lang-btn{
    border:none;
    background:transparent;
    color:#d8e8f8;
    font-weight:900;
    font-size:12px;
    padding:8px 13px;
    border-radius:8px;
    cursor:pointer;
    transition:.18s;
    white-space:nowrap;
  }
  .lang-btn.active{
    background:var(--hpm-red);
    color:#fff;
    box-shadow:0 6px 16px rgba(217,45,53,.30);
  }
  .lang-btn:not(.active):hover{
    background:rgba(255,255,255,.14);
    color:#fff;
  }
  .top .status{
    color:#d8e8f8;
    font-size:12px;
    white-space:nowrap;
  }
  @media(max-width:900px){
    .top-inner{align-items:flex-start;flex-wrap:wrap}
    .header-right{margin-left:auto}
  }
  @media(max-width:720px){
    .top{position:static}
    .top-inner{flex-direction:column;align-items:stretch;gap:10px}
    .brand{
      display:grid;
      grid-template-columns:128px minmax(0,1fr);
      gap:10px;
    }
    .logo-box{width:128px;height:46px}
    .logo-box img{max-width:118px;max-height:38px}
    .top .brand h1{font-size:15px}
    .top .brand p{font-size:12px}
    .header-right{
      width:100%;
      margin-left:0;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .lang-switch{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      min-width:220px;
    }
    .lang-btn{min-height:38px;padding:7px 10px}
  }
</style>


<style id="dashboard-button-styles">
  .dashboard-link-wrap{
    max-width:1280px;
    margin:0 auto;
    padding:0 clamp(14px,4vw,42px) 34px;
    display:flex;
    justify-content:center;
  }
  .dashboard-link{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    min-width:260px;
    padding:15px 22px;
    border-radius:13px;
    background:linear-gradient(135deg,#d7263d,#ef4055);
    color:#fff;
    text-decoration:none;
    font-weight:900;
    letter-spacing:.15px;
    box-shadow:0 12px 28px rgba(215,38,61,.28);
    transition:.18s ease;
  }
  .dashboard-link:hover{
    transform:translateY(-2px);
    box-shadow:0 16px 34px rgba(215,38,61,.36);
  }
  .dashboard-link:active{transform:translateY(0)}
  @media(max-width:720px){
    .dashboard-link{width:100%;min-width:0}
  }
</style>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyA1gMgGe8WX9RPE2sNwCGQiNpbxiUx5bug",
        authDomain: "registro-cuarentena.firebaseapp.com",
        projectId: "registro-cuarentena",

      };
      const COLLECTION = "cuarentena_gp12",
        LOCAL = "cuarentena_gp12_local";
      let cloud = false,
        db;
      async function startDB() {
        // Los archivos abiertos mediante file:// (especialmente desde una ruta de red)
        // tienen un origen único en Chrome. Firebase crea recursos internos que el
        // navegador bloquea en ese contexto. En ese caso usamos almacenamiento local
        // y evitamos los errores de seguridad de la consola.
        if (location.protocol === "file:") {
          cloud = false;
          setConnection(false);
          console.info(
            "GP12: modo local activado. Para sincronización Firebase, publique este archivo mediante HTTP/HTTPS.",
          );
          return;
        }

        try {
          if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
          db = firebase.firestore();

          // Se elimina enablePersistence(), ya que está obsoleto en esta versión.
          // Firestore continúa operando en línea sin generar la advertencia.
          await db.collection(COLLECTION).limit(1).get();
          cloud = true;
          setConnection(true);
        } catch (e) {
          console.warn("Firebase no disponible; se utilizará modo local.", e);
          cloud = false;
          setConnection(false);
        }
      }
      function localRows() {
        try {
          return JSON.parse(localStorage.getItem(LOCAL) || "[]");
        } catch {
          return [];
        }
      }
      function saveLocal(rows) {
        localStorage.setItem(LOCAL, JSON.stringify(rows));
        window.dispatchEvent(new Event("quarantine-updated"));
      }
      async function addRecord(row) {
        if (cloud) {
          await db.collection(COLLECTION).doc(row.id).set(row);
        } else {
          const a = localRows();
          a.unshift(row);
          saveLocal(a);
        }
      }
      async function updateRecord(id, changes) {
        if (cloud) {
          await db.collection(COLLECTION).doc(id).update(changes);
        } else {
          saveLocal(
            localRows().map((x) => (x.id === id ? { ...x, ...changes } : x)),
          );
        }
      }
      async function getRecords() {
        if (cloud) {
          const s = await db
            .collection(COLLECTION)
            .orderBy("creadoEn", "desc")
            .get();
          return s.docs.map((d) => d.data());
        }
        return localRows();
      }
      function watchRecords(handler) {
        if (cloud) {
          return db
            .collection(COLLECTION)
            .orderBy("creadoEn", "desc")
            .onSnapshot(
              (s) => {
                setConnection(true);
                handler(s.docs.map((d) => d.data()));
              },
              () => setConnection(false),
            );
        }
        const refresh = () => handler(localRows());
        refresh();
        window.addEventListener("storage", refresh);
        window.addEventListener("quarantine-updated", refresh);
        return () => {
          window.removeEventListener("storage", refresh);
          window.removeEventListener("quarantine-updated", refresh);
        };
      }

        const bytes = new TextEncoder().encode(value),
          hash = await crypto.subtle.digest("SHA-256", bytes);
        return [...new Uint8Array(hash)]
          .map((b) => b.toString(16).padStart(2, "0"))

    }
    if (typeof loadActive === "function" && !document.getElementById("releaseForm")?.classList.contains("hidden")) {
      try { loadActive().then(() => applyElement(document.body, currentLang)); } catch(_){}
    }
  }

  const observer = new MutationObserver(mutations => {
    observer.disconnect();
    for (const m of mutations) {
      m.addedNodes.forEach(n => {
        if (n.nodeType === Node.TEXT_NODE) setTextNode(n, currentLang);
        else if (n.nodeType === Node.ELEMENT_NODE) applyElement(n, currentLang);
      });
      if (m.type === "characterData") setTextNode(m.target, currentLang);
    }
    observer.observe(document.body,{subtree:true,childList:true,characterData:true});
  });

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".lang-btn").forEach(btn =>
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang))
    );
    setLanguage(currentLang);
    observer.observe(document.body,{subtree:true,childList:true,characterData:true});
  });

  window.gp12SetLanguage = setLanguage;
})();
</script>

</body>
</html>
